version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "./schema.sql"             # canonical schema definition for migrations
    queries:
      - "../internal/db/queries"    # directory that holds .sql query files
    gen:
      go:
        package: "db"              # generated package name
        out: "../internal/db"       # where generated Go files live (relative to this file)
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: false
        emit_exported_queries: false
        output_db_file_name: "db.go"
        output_models_file_name: "models.go"
        output_querier_file_name: "querier.go"
        output_files_suffix: "_gen"
        overrides:
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "app.message_sender"
            go_type: "string"
          - db_type: "app.interview_status"
            go_type: "string"
          - db_type: "app.response_category"
            go_type: "string"
